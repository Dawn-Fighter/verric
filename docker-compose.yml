services:
  verric:
    build:
      context: .
      dockerfile: Dockerfile
    image: verric:latest
    container_name: verric
    ports:
      - "3000:3000"
    # Secrets are injected at runtime, never baked into the image.
    # Reuses your existing apps/web/.env.local. Verric supports OpenAI,
    # Anthropic, or local Ollama via VERRIC_PROVIDER. There is NO mock
    # fallback — if the chosen provider can't be reached, the run fails
    # honestly with a real error.
    env_file:
      - apps/web/.env.local
    environment:
      NODE_ENV: production
      VERRIC_PROVIDER: ${VERRIC_PROVIDER:-openai}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    restart: unless-stopped
    healthcheck:
      # Alpine ships busybox wget (no --spider/--no-verbose), and the server
      # binds to IPv4 0.0.0.0, so probe 127.0.0.1 rather than localhost (::1).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
