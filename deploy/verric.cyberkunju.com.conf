# /etc/nginx/conf.d/verric.cyberkunju.com.conf
# Verric reporting studio - name-based virtual host on the shared nginx.
# Routes verric.cyberkunju.com -> Verric Docker container at 127.0.0.1:3000.
# Self-contained: does NOT modify the versifine.com vhost or the default
# catch-all (00-base.conf). Relies on the $connection_upgrade map and
# client_max_body_size declared in 00-base.conf.

upstream verric_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- Plain HTTP -> redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name verric.cyberkunju.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name verric.cyberkunju.com;

    ssl_certificate     /etc/ssl/verric.cyberkunju.com/cert.pem;
    ssl_certificate_key /etc/ssl/verric.cyberkunju.com/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/verric.access.log;
    error_log  /var/log/nginx/verric.error.log warn;

    location / {
        proxy_pass http://verric_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        # /api/generate-report calls OpenAI and can take ~25s; allow headroom.
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
